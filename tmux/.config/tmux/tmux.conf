unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g default-shell "$SHELL"
set -g default-command "$SHELL"

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

set -g mouse on

set-window-option -g mode-keys vi

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-option -g status-position top

# Options to make tmux more pleasant
set -g mouse on
set -g default-terminal "tmux-256color"

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Load catppuccin
# run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
run ~/.tmux/plugins/tmux/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_text " #W"
# set -g status-left ""
set -g window-status-current-format "#[fg=#11111b,bg=#{@thm_mauve}]#[fg=#181825,reverse]#[none]#I #[fg=#cdd6f4,bg=#{@thm_surface_1}] #W#[fg=#181825,reverse]#[none]"
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Enable clipboard integration
set -g set-clipboard on

# Vi mode clipboard bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
# Strip Claude Code's 2-space render indent before copying to clipboard.
# Preserves nested indentation (Python-safe). Y strips all leading whitespace.
# `tmux load-buffer -w -` writes the transformed text to a tmux buffer AND
# emits OSC 52, which the local terminal (WezTerm/iTerm) forwards to the
# system clipboard — works both on local macOS and over SSH on Linux.
bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "sed 's/^  //' | tmux load-buffer -w -"
bind-key -T copy-mode-vi Y     send-keys -X copy-pipe-and-cancel "sed 's/^[[:space:]]*//' | tmux load-buffer -w -"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "sed 's/^  //' | tmux load-buffer -w -"

# Also set tmux-yank's override in case the plugin gets installed later.
set -g @override_copy_command 'sed "s/^  //" | tmux load-buffer -w -'

# Easy copy mode access
bind-key [ copy-mode
bind-key ] paste-buffer

# List of plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.0'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tpm'

# Toggle outer tmux keys off/on with F12 (for nested tmux sessions)
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=colour245,bg=colour238" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

set -g status-style bg=default
